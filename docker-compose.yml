services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: duka_yetu
    ports:
      - "5433:5432"
    volumes:
      - duka_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - duka-network

  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/duka_yetu
      - ENVIRONMENT=development
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CLOUDINARY_UPLOAD_PRESET=duka_yetu
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - SUPER_ADMIN_USERNAME=${SUPER_ADMIN_USERNAME:-superadmin}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:-}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-superadmin@dukayetu.local}
      - MPESA_ENVIRONMENT=${MPESA_ENVIRONMENT:-sandbox}
      - MPESA_CONSUMER_KEY=${MPESA_CONSUMER_KEY:-}
      - MPESA_CONSUMER_SECRET=${MPESA_CONSUMER_SECRET:-}
      - MPESA_PASSKEY=${MPESA_PASSKEY:-}
      - MPESA_SHORTCODE=${MPESA_SHORTCODE:-174379}
      - MPESA_CALLBACK_BASE_URL=${MPESA_CALLBACK_BASE_URL:-}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:8001}
      - MARKETPLACE_COMMISSION_PERCENT=${MARKETPLACE_COMMISSION_PERCENT:-5}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_BASIC_MONTHLY_PRICE_ID=${STRIPE_BASIC_MONTHLY_PRICE_ID}
      - STRIPE_BASIC_YEARLY_PRICE_ID=${STRIPE_BASIC_YEARLY_PRICE_ID}
      - STRIPE_PROFESSIONAL_MONTHLY_PRICE_ID=${STRIPE_PROFESSIONAL_MONTHLY_PRICE_ID}
      - STRIPE_PROFESSIONAL_YEARLY_PRICE_ID=${STRIPE_PROFESSIONAL_YEARLY_PRICE_ID}
      - STRIPE_ENTERPRISE_MONTHLY_PRICE_ID=${STRIPE_ENTERPRISE_MONTHLY_PRICE_ID}
      - STRIPE_ENTERPRISE_YEARLY_PRICE_ID=${STRIPE_ENTERPRISE_YEARLY_PRICE_ID}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - duka-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - duka-network
    restart: unless-stopped

volumes:
  duka_postgres_data:

networks:
  duka-network:
    driver: bridge